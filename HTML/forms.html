<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERN Form Integration</title>
    <link rel="stylesheet" href="../CSS/Position.css">
</head>
<body>
    <div>
        <heade>
            <h1>Forms</h1>
    </header>
        <main>
        <form>
            
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Shreya"><br>
        

            
                <label for="email">Email Address:</label>
                <input type="email" id="email" placeholder="bshreya2@gmail.com"><br>
            

         
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="1234"><br>
        

            
                <label for="phone">Phone Number:</label>
                <input type="phone no" id="phone" placeholder="98889933344"><br>
            

            
                <label>Gender:</label>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female <br>
            
                <label>Qualification:</label>
                <input type="checkbox"> 10<sup>th</sup>
                <input type="checkbox"> 12<sup>th</sup>
                <input type="checkbox"> Diploma
                <input type="checkbox"> Bachelors
                <input type="checkbox"> Masters
                <input type="checkbox"> Doctorate<br>
            

          
                <label for="dob">Date of Birth:</label>
                <input type="datetime-local" id="dob"><br>
            

            
                <label for="profile-img">Profile Image:</label>
                <input type="file" id="profile-img"><br>
            
            <button type="submit">Submit Data</button>
        </form>
    </div>
</body>
</html>
