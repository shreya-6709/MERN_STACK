<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form>

        <label>Name:</label>
        <input type="text" id="name" placeholder="Enter Name">
        <br><br>

        <label>Email:</label>
        <input type="email" id="email" placeholder="Enter Email">
        <br><br>

        <label>Password:</label>
        <input type="password" id="password" placeholder="Enter Password">
        <br><br>

        <label>Phone Number:</label>
        <input type="tel" id="phone" placeholder="9876543210">
        <br><br>

        <label>Gender:</label>

        <input type="radio" name="gender" value="Male">Male

        <input type="radio" name="gender" value="Female">Female

        <input type="radio" name="gender" value="Prefer not to say">
        Prefer not to say
        <br><br>

        <label>Qualification:</label>

        <input type="checkbox" class="qualification" value="10th">10<sup>th</sup>

        <input type="checkbox" class="qualification" value="12th">12<sup>th</sup>

        <input type="checkbox" class="qualification" value="Diploma">Diploma

        <input type="checkbox" class="qualification" value="Bachelors">Bachelors

        <input type="checkbox" class="qualification" value="Masters">Masters

        <input type="checkbox" class="qualification" value="Doctorate">Doctorate

        <br><br>

        <label>DOB:</label>
        <input type="date" id="dob">
        <br><br>

        <label>Upload Image:</label>
        <input type="file" id="image" accept="image/*">
        <br><br>

        <button type="button" onclick="show()">Submit</button>

    </form>

    <hr>

    <div id="result"></div>

    <script src="../JS/script.js"></script>

</body>
</html>
